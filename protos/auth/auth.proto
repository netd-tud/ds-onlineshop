syntax = "proto3";

package auth;

option go_package = "github.com/turt1z/microservices-demo/proto/auth;authpb";


// ------------Authentication and authorization services------------------

service AuthService {

  rpc Login (LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
}
