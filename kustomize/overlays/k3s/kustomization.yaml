apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ingress.yaml

components:
- ../../components/without-loadgenerator
- ../../components/ratingservice
#- ../../components/mqtt-broker
- ../../components/monitoring
- ../../components/dynamic-load-producer
- ../../components/dynamic-load-producer-replicated
- ../../components/studentmanagement-wrapper

images:
  - name: us-central1-docker.pkg.dev/google-samples/microservices-demo/frontend
    newName: frontend
    newTag: latest
  - name: us-central1-docker.pkg.dev/google-samples/microservices-demo/emailservice
    newName: emailservice
    newTag: latest
  - name: ratingservice
    newTag: latest
  - name: inventory
    newTag: latest
  - name: studentmanagement-wrapper
    newTag: latest
  - name: us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice
    newName: productcatalogservice
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: frontend
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: emailservice
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: ratingservice
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: inventoryservice
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: productcatalogservice
