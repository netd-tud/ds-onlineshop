apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-broker-config
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    persistence false
    log_dest stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
  labels:
    app: mqtt-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.1-alpine
          ports:
            - containerPort: 1883
          volumeMounts:
            - mountPath: /mosquitto/config/mosquitto.conf
              name: config
              subPath: mosquitto.conf
      volumes:
        - name: config
          configMap:
            name: mqtt-broker-config
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker
  labels:
    app: mqtt-broker
spec:
  type: ClusterIP
  ports:
    - port: 1883
      targetPort: 1883
  selector:
    app: mqtt-broker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mqtt-broker
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    app: mqtt-broker
  ports:
    - protocol: TCP
      port: 1883
      targetPort: 1883
      nodePort: 31883

