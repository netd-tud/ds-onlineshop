apiVersion: apps/v1
kind: Deployment
metadata:
  name: dtm-db
  labels:
    app: dtm-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dtm-db
  template:
    metadata:
      labels:
        app: dtm-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: dtm
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dtm-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dtm-db-secret
                  key: password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dtm", "-d", "dtm"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dtm-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dtm-db
  labels:
    app: dtm-db
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: dtm-db
  type: ClusterIP
