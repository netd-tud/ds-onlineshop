scrape_configs:
    - job_name: "Frontend"
      metrics_path: "/actuator/prometheus"
      scrape_interval: 10s
      scrape_timeout: 9s
      honor_timestamps: true
      static_configs:
          - targets: ["frontend-demo:8080"]
            labels:
                application: "Frontend"

    - job_name: "cAdvisor"
      metrics_path: "/metrics"
      scrape_interval: 10s
      honor_timestamps: true
      kubernetes_sd_configs:
        - role: endpointslice
      relabel_configs:
        - source_labels: [__meta_kubernetes_endpointslice_address_type]
          action: keep
          regex: IPv4
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: cadvisor
        - source_labels: [__meta_kubernetes_endpointslice_node_name]
          target_label: instance

    - job_name: 'pushgateway'
      honor_labels: true
      static_configs:
        - targets: [ 'prometheus:9091' ]
