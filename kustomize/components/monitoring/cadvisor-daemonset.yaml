apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  labels:
    app: cadvisor
spec:
  selector:
    matchLabels:
      name: cadvisor
  template:
    metadata:
      labels:
        name: cadvisor
    spec:
      containers:
        - name: cadvisor
          image: ghcr.io/google/cadvisor:0.57
          imagePullPolicy: IfNotPresent
          args:
            - --containerd=/var/run/containerd/containerd.sock
          resources:
            limits:
              cpu: 300m
              memory: 200Mi
            requests:
              cpu: 150m
              memory: 100Mi
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: containerd
              mountPath: /var/run/containerd/containerd.sock
              readOnly: true
          ports:
            - containerPort: 8080
              name: http
      automountServiceAccountToken: false
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: containerd
          hostPath:
            path: /run/k3s/containerd/containerd.sock
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: default
  labels:
    app: cadvisor
spec:
  clusterIP: None
  ports:
    - name: metrices
      port: 8080
      targetPort: 8080
  selector:
    name: cadvisor
