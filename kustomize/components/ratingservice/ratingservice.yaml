apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratingservice
  labels:
    app: ratingservice
spec:
  selector:
    matchLabels:
      app: ratingservice
  template:
    metadata:
      labels:
        app: ratingservice
    spec:
      serviceAccountName: ratingservice
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: server
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
          image: ratingservice
          ports:
            - containerPort: 50001
          env:
            - name: PORT
              value: "50001"
          resources:
            requests:
              cpu: 200m
              memory: 180Mi
            limits:
              cpu: 300m
              memory: 300Mi
#          readinessProbe:
#            initialDelaySeconds: 20
#            periodSeconds: 15
#            grpc:
#              port: 9555
          livenessProbe:
            initialDelaySeconds: 10
            periodSeconds: 5
            httpGet:
              port: 50001
              path: /healthz
---
apiVersion: v1
kind: Service
metadata:
  name: ratingservice
  labels:
    app: ratingservice
spec:
  type: ClusterIP
  selector:
    app: ratingservice
  ports:
    - name: http
      port: 50001
      targetPort: 50001
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ratingservice
