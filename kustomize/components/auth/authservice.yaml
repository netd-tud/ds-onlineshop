apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  labels:
    app: authservice
spec:
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
    spec:
      serviceAccountName: authservice
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: server
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
          image: ghcr.io/turt1z/microservices-demo/authservice:latest
          ports:
            - name: http
              containerPort: 50050
          env:
            - name: PORT
              value: "50050"
            - name: LDAP_SERVICE_ADDR
              value: "ldap://ldap:3890"
            - name: LDAP_ADMIN_DN
              value: "cn=admin,dc=theonlineshop,dc=com"
            - name: LDAP_ADMIN_PASS
              value: "admin" # TODO: change to secret
            - name: LDAP_BASE_DN
              value: "dc=theonlineshop,dc=com"
            - name: JWT_PRIVATE_KEY_PATH
              value: "/etc/auth/auth_private.pem"
          resources:
            requests:
              cpu: 200m
              memory: 180Mi
            limits:
              cpu: 300m
              memory: 300Mi
          readinessProbe:
            grpc:
              port: 50050
          livenessProbe:
            grpc:
              port: 50050
          volumeMounts:
            - name: jwt-key-volume
              mountPath: /etc/auth
              readOnly: true
      volumes:
        - name: jwt-key-volume
          secret:
            secretName: jwt-private-key
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: authservice
  labels:
    app: authservice
spec:
  type: ClusterIP
  selector:
    app: authservice
  ports:
    - name: http
      port: 50050
      targetPort: 50050
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authservice
