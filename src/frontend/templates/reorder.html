{{ define "reorder" }}

{{ template "header" . }}
<div {{ with $.platform_css }} class="{{.}}" {{ end }}>
  <span class="platform-flag">
    {{$.platform_name}}
  </span>
</div>
<main role="main" class="home">

  <div class="container-fluid">
    <div class="row">
      <div class="col-12 col-lg-12 px-10-percent">

        <div class="row products-row px-xl-6">

          <div class="col-12">
            <h3>Inventory</h3>
          </div>

          {{ range $.products }}
          <div class="col-md-4 product-card">
            <a href="{{ $.baseUrl }}/product/{{.Item.Id}}">
              <img loading="lazy" src="{{ $.baseUrl }}{{.Item.Picture}}">
              <div class="product-card-img-overlay"></div>
            </a>
            <div>
              <div class="product-card-name">{{ .Item.Name }}</div>
              <form method="POST" action="{{ $.baseUrl }}/reorder">
                <input type="hidden" name="product_id" value="{{.Item.Id}}" />
                <div class="product-stock-row">
                  <div class="stock-status">
                    {{ template "inventoryStockProduct" . }}
                  </div>

                  <div class="reorder-controls">
                    <input type="number" name="quantity" class="form-control quantity-input" min="1" step="1" value="10">
                    <button type="submit" class="cymbal-button-primary">Reorder</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
          {{ end }}

        </div>

        <!-- Footer for larger screens. -->
        <div class="row d-none d-lg-block home-desktop-footer-row">
          <div class="col-12 p-0">
            {{ template "footer" . }}
          </div>
        </div>

      </div>

    </div>
  </div>

</main>

<!-- Footer for smaller screens. -->
<div class="d-lg-none">
  {{ template "footer" . }}
</div>

{{ end }}
